<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Detalhes do Usuário</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f8f9fa;
      font-family: 'Segoe UI', sans-serif;
    }

    .container {
      max-width: 700px;
      margin-top: 60px;
    }

    h1 {
      font-size: 2.5rem;
      color: #343a40;
      margin-bottom: 30px;
      border-bottom: 2px solid #dee2e6;
      padding-bottom: 10px;
    }

    .card {
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    }

    .card-header {
      background-color: #4e73df;
      color: white;
      border-top-left-radius: 16px;
      border-top-right-radius: 16px;
      padding: 20px;
    }

    .card-body {
      padding: 30px;
    }

    .card-footer {
      background-color: #f1f3f5;
      border-bottom-left-radius: 16px;
      border-bottom-right-radius: 16px;
      padding: 15px 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .btn-warning {
      background-color: #f6c23e;
      border: none;
    }

    .btn-warning:hover {
      background-color: #dda20a;
    }

    .btn-danger {
      background-color: #e74a3b;
      border: none;
    }

    .btn-danger:hover {
      background-color: #c82333;
    }

    .btn-secondary {
      background-color: #858796;
      border: none;
    }

    .btn-secondary:hover {
      background-color: #6c757d;
    }

    p {
      font-size: 1.1rem;
      margin-bottom: 12px;
    }

    strong {
      color: #495057;
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 2rem;
      }

      .card-body {
        padding: 20px;
      }

      .card-footer {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>Detalhes do Usuário</h1>

  <div class="card">
    <div class="card-header">
      <h5 class="mb-0" th:text="${usuario.nome}"></h5>
    </div>
    <div class="card-body">
      <p><strong>ID:</strong> <span th:text="${usuario.id}"></span></p>
      <p><strong>Nome:</strong> <span th:text="${usuario.nome}"></span></p>
      <p><strong>Email:</strong> <span th:text="${usuario.email}"></span></p>
    </div>
    <div class="card-footer">
      <a th:href="@{/usuario/editar/{id}(id=${usuario.id})}" class="btn btn-warning">Editar</a>
      <a th:href="@{/usuario/deletar/{id}(id=${usuario.id})}" class="btn btn-danger"
         onclick="return confirm('Tem certeza que deseja excluir este usuário?')">Excluir</a>
      <a th:href="@{/usuario/listar-usuario}" class="btn btn-secondary">Voltar para Lista</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
