<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Novo Usuário</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f8f9fa;
      font-family: 'Segoe UI', sans-serif;
    }

    .container {
      background-color: #ffffff;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      padding: 40px;
      margin-top: 60px;
      max-width: 600px;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 30px;
      color: #343a40;
      border-bottom: 2px solid #dee2e6;
      padding-bottom: 10px;
    }

    .form-label {
      font-weight: 600;
    }

    .btn-primary {
      background-color: #4e73df;
      border: none;
    }

    .btn-primary:hover {
      background-color: #2e59d9;
    }

    .btn-secondary {
      margin-left: 10px;
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 2rem;
      }

      .container {
        padding: 20px;
        margin-top: 30px;
      }

      .btn {
        width: 100%;
        margin-top: 10px;
      }

      .btn-secondary {
        margin-left: 0;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>Cadastrar Novo Usuário</h1>

  <form th:action="@{/usuario/salvar}" th:object="${usuario}" method="post">
    <div class="mb-3">
      <label for="nome" class="form-label">Nome</label>
      <input type="text" class="form-control" id="nome" th:field="*{nome}" placeholder="Digite o nome completo" required>
    </div>

    <div class="mb-3">
      <label for="email" class="form-label">Email</label>
      <input type="email" class="form-control" id="email" th:field="*{email}" placeholder="exemplo@dominio.com" required>
    </div>

    <div class="mb-4">
      <label for="senha" class="form-label">Senha</label>
      <input type="password" class="form-control" id="senha" th:field="*{senha}" placeholder="Digite uma senha segura" required>
    </div>

    <div class="d-flex flex-wrap justify-content-between">
      <button type="submit" class="btn btn-primary shadow">Salvar</button>
      <a th:href="@{/usuario/listar-usuario}" class="btn btn-secondary shadow">Cancelar</a>
    </div>
  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
